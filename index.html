<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマブラ MINI</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; touch-action:none; }
        canvas { display:block; }
        #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
        #title { 
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            color:#0ff; font-size:75px; font-weight:bold; text-shadow:0 0 40px #0ff;
            border:8px solid #0ff; padding:35px 80px; border-radius:30px;
            background:rgba(0,0,0,0.9); cursor:pointer; pointer-events:all;
        }
        .status { position:absolute; top:15px; color:white; font-size:21px; font-weight:bold; }
        #p1status { left:20px; }
        #cpustatus { right:20px; text-align:right; }

        #movePad { 
            position:absolute; bottom:25px; left:25px; width:130px; height:130px; 
            background:rgba(0,255,255,0.18); border:5px solid rgba(0,255,255,0.7); 
            border-radius:50%; pointer-events:all; z-index:20;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <div id="title">ＳＴＡＲＴ</div>
        <div class="status" id="p1status">P1 0% (3)</div>
        <div class="status" id="cpustatus">CPU 0% (3)</div>
        <div id="movePad"></div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W = 1000, H = 600;
        canvas.width = W; canvas.height = H;

        // ====================== 画像を設定 ======================
        const playerImg = new Image();
        playerImg.src = "player.png";     // ← 右向きの画像を入れてください

        const cpuImg = new Image();
        cpuImg.src = "cpu.png";           // ← 右向きの画像を入れてください
        // =======================================================

        let p1 = { x:300, y:400, vx:0, vy:0, stocks:3, damage:0, facing:1, state:"idle", punchCount:0 };
        let cpu = { x:700, y:400, vx:0, vy:0, stocks:3, damage:0, facing:-1, state:"idle" };

        let keys = {};
        let lastAttack = 0;
        let gameRunning = false;
        let platforms = [];

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;

            platforms = [
                {x: W*0.05, y: H*0.88, w: W*0.9, h: 30},
                {x: W*0.15, y: H*0.68, w: W*0.25, h: 20},
                {x: W*0.63, y: H*0.68, w: W*0.25, h: 20},
                {x: W*0.37, y: H*0.48, w: W*0.26, h: 20}
            ];
        }
        window.addEventListener('resize', resize);
        resize();

        function startGame() {
            document.getElementById('title').style.display = 'none';
            gameRunning = true;
            p1.x = W*0.3; p1.y = H*0.65;
            cpu.x = W*0.7; cpu.y = H*0.65;
        }

        // タイトル
        document.getElementById('title').addEventListener('click', startGame);
        document.getElementById('title').addEventListener('touchstart', e => { e.preventDefault(); startGame(); });

        // 移動パッド
        const movePad = document.getElementById('movePad');
        movePad.addEventListener('touchmove', e => {
            if (!gameRunning) return;
            const t = e.touches[0];
            const rect = movePad.getBoundingClientRect();
            const dx = t.clientX - (rect.left + 65);
            const dy = t.clientY - (rect.top + 65);

            keys['a'] = dx < -20;
            keys['d'] = dx > 20;
            keys['k'] = dy < -25;
        });
        movePad.addEventListener('touchend', () => keys['a'] = keys['d'] = keys['k'] = false);

        canvas.addEventListener('touchstart', e => {
            if (!gameRunning) { startGame(); return; }
            for (let t of e.touches) {
                if (t.clientX < 180 && t.clientY > H - 180) continue;
                keys['j'] = true;
            }
        });
        canvas.addEventListener('touchend', () => keys['j'] = false);

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function update(ch, isPlayer) {
            // ... 移動・攻撃ロジックは省略（前回と同じ）...
            ch.vy += 0.78;
            ch.x += ch.vx;
            ch.y += ch.vy;
            ch.vx *= 0.85;

            // 簡略化のため省略（必要なら前回のコードからコピー）
            if (isPlayer) {
                if (keys['a']) { ch.vx = -7.2; ch.facing = -1; }
                if (keys['d']) { ch.vx = 7.2; ch.facing = 1; }
                if (keys['k'] && ch.onGround) ch.vy = -18.5;
                // パンチ処理...
            } else {
                // CPU AI...
            }

            if (ch.y > H + 80) {
                ch.stocks--;
                ch.x = isPlayer ? W*0.3 : W*0.7;
                ch.y = H*0.25;
                ch.vx = ch.vy = 0;
                ch.damage = 0;
            }
        }

        function checkHit(attacker, target, power) {
            if (Math.hypot(attacker.x - target.x, attacker.y - target.y) < 78) {
                target.damage += power;
                target.vx += attacker.facing * (12 + target.damage / 8);
                target.vy = -9.5;
            }
        }

        // ====================== 画像描画（反転対応） ======================
        function drawChar(ch, img) {
            ctx.save();
            ctx.translate(ch.x + 20, ch.y + 30);
            
            // 左を向いている場合は左右反転
            if (ch.facing < 0) {
                ctx.scale(-1, 1);
            }

            ctx.drawImage(img, -25, -55, 50, 70);   // 画像サイズ調整
            ctx.restore();

            // 攻撃エフェクト
            if (ch.state === "punch") {
                ctx.fillStyle = 'rgba(255,255,0,0.6)';
                ctx.fillRect(ch.x + (ch.facing * 35), ch.y + 10, 40, 25);
            }
            if (ch.state === "smash") {
                ctx.fillStyle = 'rgba(255,0,255,0.7)';
                ctx.fillRect(ch.x + (ch.facing * 35), ch.y - 10, 55, 35);
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            ctx.fillStyle = '#112233';
            ctx.fillRect(0, 0, W, H);

            // プラットフォーム
            ctx.fillStyle = '#557799';
            platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

            if (gameRunning) {
                update(p1, true);
                update(cpu, false);
            }

            drawChar(p1, playerImg);
            drawChar(cpu, cpuImg);

            document.getElementById('p1status').textContent = `P1 ${p1.damage}% (${p1.stocks})`;
            document.getElementById('cpustatus').textContent = `CPU ${cpu.damage}% (${cpu.stocks})`;
        }

        loop();
    </script>
</body>
</html>
