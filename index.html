<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呪術廻戦 スマブラ MINI</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; touch-action:none; }
        canvas { display:block; }
        #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
        #title { 
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            color:#ff0; font-size:65px; font-weight:bold; text-shadow:0 0 30px #ff0;
            border:6px solid #ff0; padding:25px 60px; border-radius:20px;
            background:rgba(0,0,0,0.85); cursor:pointer;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <div id="title">ＳＴＡＲＴ</div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W = 1000, H = 600;
        canvas.width = W; canvas.height = H;

        let p1 = { x:300, y:400, vx:0, vy:0, stocks:3, damage:0, facing:1, state:"idle", punchCount:0 }; // 虎杖
        let cpu = { x:700, y:400, vx:0, vy:0, stocks:3, damage:0, facing:-1, state:"idle" }; // 真人

        let keys = {};
        let lastAttack = 0;
        let gameRunning = false;

        const platforms = [
            {x:50, y:520, w:900, h:30},
            {x:180, y:400, w:220, h:20},
            {x:600, y:400, w:220, h:20},
            {x:380, y:280, w:240, h:20}
        ];

        function startGame() {
            document.getElementById('title').style.display = 'none';
            gameRunning = true;
            p1.x = 300; p1.y = 400;
            cpu.x = 700; cpu.y = 400;
        }

        document.getElementById('title').addEventListener('click', startGame);
        document.getElementById('title').addEventListener('touchstart', e => { e.preventDefault(); startGame(); });

        // スマホ操作（前回と同じ）
        canvas.addEventListener('touchstart', e => {
            if (!gameRunning) { startGame(); return; }
            for (let t of e.touches) {
                if (t.clientX < 200 && t.clientY > H-200) continue;
                keys['j'] = true;
            }
        });
        canvas.addEventListener('touchend', () => keys['j'] = false);

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function update(ch, isPlayer) {
            ch.vy += 0.78;
            ch.x += ch.vx;
            ch.y += ch.vy;
            ch.vx *= 0.85;

            // 地面判定省略（動作確認用）
            if (ch.y > H - 80) {
                ch.y = H - 80;
                ch.vy = 0;
            }

            if (isPlayer) {
                if (keys['a']) { ch.vx = -7; ch.facing = -1; }
                if (keys['d']) { ch.vx = 7; ch.facing = 1; }
                if (keys['j'] && Date.now() - lastAttack > 160) {
                    lastAttack = Date.now();
                    ch.punchCount++;
                    if (ch.punchCount >= 4) {
                        ch.state = "smash";
                        ch.punchCount = 0;
                    } else {
                        ch.state = "punch";
                    }
                    setTimeout(() => ch.state = "idle", 200);
                }
            } else {
                // CPU簡易AI
                const dx = p1.x - ch.x;
                if (Math.abs(dx) > 60) ch.vx += Math.sign(dx) * 0.8;
                if (Math.random() < 0.12) ch.state = "punch";
                if (Math.random() < 0.05) ch.state = "smash";
            }
        }

        // ====================== キャラ描画（呪術廻戦風） ======================
        function drawItadori(x, y, facing) {  // 虎杖悠仁
            ctx.save();
            ctx.translate(x, y);
            if (facing < 0) ctx.scale(-1, 1);

            // 体（黒制服）
            ctx.fillStyle = '#222';
            ctx.fillRect(-18, -45, 36, 55);
            // 髪（ピンク）
            ctx.fillStyle = '#ff88aa';
            ctx.fillRect(-22, -65, 44, 28);
            // 顔
            ctx.fillStyle = '#ffddbb';
            ctx.fillRect(-12, -55, 24, 18);
            // 目
            ctx.fillStyle = '#000';
            ctx.fillRect(-8, -50, 5, 5);
            ctx.fillRect(3, -50, 5, 5);

            ctx.restore();
        }

        function drawMahito(x, y, facing) {  // 真人
            ctx.save();
            ctx.translate(x, y);
            if (facing < 0) ctx.scale(-1, 1);

            // 体（黒スーツ）
            ctx.fillStyle = '#111';
            ctx.fillRect(-18, -45, 36, 55);
            // 髪（白）
            ctx.fillStyle = '#eee';
            ctx.fillRect(-20, -68, 40, 30);
            // 顔（独特な感じ）
            ctx.fillStyle = '#ffccaa';
            ctx.fillRect(-15, -52, 30, 22);
            // 目（不気味）
            ctx.fillStyle = '#000';
            ctx.fillRect(-9, -48, 6, 8);
            ctx.fillRect(3, -48, 6, 8);

            ctx.restore();
        }

        function loop() {
            requestAnimationFrame(loop);
            ctx.fillStyle = '#112233';
            ctx.fillRect(0, 0, W, H);

            // ステージ
            ctx.fillStyle = '#557799';
            ctx.fillRect(50, 520, 900, 30);

            if (gameRunning) {
                update(p1, true);
                update(cpu, false);
            }

            drawItadori(p1.x, p1.y, p1.facing);
            drawMahito(cpu.x, cpu.y, cpu.facing);

            ctx.fillStyle = 'white';
            ctx.font = 'bold 22px sans-serif';
            ctx.fillText(`虎杖 ${p1.damage}% (${p1.stocks})`, 50, 50);
            ctx.fillText(`真人 ${cpu.damage}% (${cpu.stocks})`, W-280, 50);
        }

        loop();
    </script>
</body>
</html>
